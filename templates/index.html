<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결사 멤버 현황</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      min-height: 100vh;
    }

    /* ── 설정 오버레이 ── */
    #setup-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
    }
    #setup-box {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 14px;
      padding: 36px 40px;
      width: 100%; max-width: 520px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }
    #setup-box h2 {
      font-size: 1.2rem; font-weight: 700;
      color: #e2b96f; margin-bottom: 6px;
    }
    #setup-box p {
      font-size: 0.82rem; color: #718096; margin-bottom: 28px; line-height: 1.6;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 0.78rem; font-weight: 600;
      color: #a0aec0; margin-bottom: 7px; letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .form-group input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.85rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #e2b96f; }
    .form-group input::placeholder { color: #4a5568; font-size: 0.8rem; }
    .form-hint { font-size: 0.75rem; color: #4a5568; margin-top: 5px; }

    #setup-error {
      background: #2d1515; border: 1px solid #822; border-radius: 6px;
      color: #fc8181; font-size: 0.82rem; padding: 10px 14px;
      margin-bottom: 16px; display: none;
    }
    #btn-load {
      width: 100%;
      background: #e2b96f; border: none; border-radius: 8px;
      color: #0f1117; font-size: 0.9rem; font-weight: 700;
      padding: 12px; cursor: pointer; transition: background 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    #btn-load:hover { background: #f0c97a; }
    #btn-load:disabled { background: #4a5568; color: #718096; cursor: not-allowed; }

    /* ── 메인 레이아웃 ── */
    #main { display: none; }

    header {
      background: linear-gradient(135deg, #1a1f2e 0%, #16213e 100%);
      border-bottom: 1px solid #2d3748;
      padding: 18px 32px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; color: #e2b96f; }
    #header-url {
      font-size: 0.72rem; color: #4a5568;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 340px;
    }
    #btn-change {
      background: transparent; border: 1px solid #2d3748;
      border-radius: 6px; color: #718096;
      font-size: 0.78rem; padding: 5px 12px; cursor: pointer;
      transition: all 0.2s; white-space: nowrap;
    }
    #btn-change:hover { border-color: #e2b96f; color: #e2b96f; }

    /* ── 요약 카드 ── */
    .stats { display: flex; gap: 14px; padding: 22px 32px 0; flex-wrap: wrap; }
    .card {
      background: #1a1f2e; border: 1px solid #2d3748;
      border-radius: 10px; padding: 14px 22px;
      min-width: 140px; flex: 1;
    }
    .card .label {
      font-size: 0.7rem; color: #718096;
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px;
    }
    .card .value { font-size: 1.5rem; font-weight: 700; color: #e2b96f; }
    .card .sub   { font-size: 0.72rem; color: #4a5568; margin-top: 2px; }

    /* ── 툴바 ── */
    .toolbar {
      display: flex; gap: 10px; padding: 18px 32px;
      align-items: center; flex-wrap: wrap;
    }
    .search-wrap {
      position: relative; flex: 1; min-width: 180px; max-width: 320px;
    }
    .search-wrap svg {
      position: absolute; left: 11px; top: 50%;
      transform: translateY(-50%); color: #4a5568; pointer-events: none;
    }
    .search-wrap input {
      width: 100%; background: #1a1f2e; border: 1px solid #2d3748;
      border-radius: 8px; color: #e2e8f0; font-size: 0.88rem;
      padding: 9px 12px 9px 36px; outline: none; transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: #e2b96f; }
    .search-wrap input::placeholder { color: #4a5568; }
    select {
      background: #1a1f2e; border: 1px solid #2d3748;
      border-radius: 8px; color: #e2e8f0; font-size: 0.88rem;
      padding: 9px 12px; outline: none; cursor: pointer;
      transition: border-color 0.2s;
    }
    select:focus { border-color: #e2b96f; }
    #count { font-size: 0.8rem; color: #4a5568; white-space: nowrap; }

    #btn-refresh {
      background: #e2b96f; border: none; border-radius: 8px;
      color: #0f1117; font-size: 0.82rem; font-weight: 700;
      padding: 9px 16px; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.2s; margin-left: auto;
    }
    #btn-refresh:hover { background: #f0c97a; }
    #btn-refresh:disabled { background: #4a5568; color: #718096; cursor: not-allowed; }

    /* ── 테이블 ── */
    .table-wrap { padding: 0 32px 40px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead th {
      background: #1a1f2e; color: #718096;
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 12px 16px; text-align: left;
      border-bottom: 1px solid #2d3748; white-space: nowrap;
      cursor: pointer; user-select: none; position: sticky; top: 0;
    }
    thead th:hover { color: #e2b96f; }
    thead th.sorted-asc::after  { content: ' ▲'; color: #e2b96f; }
    thead th.sorted-desc::after { content: ' ▼'; color: #e2b96f; }
    tbody tr { border-bottom: 1px solid #1e2435; transition: background 0.15s; }
    tbody tr:hover { background: #1a1f2e; }
    td { padding: 11px 16px; white-space: nowrap; }
    td.num  { text-align: right; color: #a0aec0; font-variant-numeric: tabular-nums; }
    td.id   { font-weight: 600; color: #e2e8f0; }
    td.rank { text-align: center; color: #4a5568; font-size: 0.8rem; }

    .grade {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 0.78rem; font-weight: 700; text-align: center; min-width: 32px;
    }
    .g-high { background: #2d4a22; color: #68d391; }
    .g-mid  { background: #2a3a1a; color: #9ae66e; }
    .g-low  { background: #3a2a1a; color: #f6ad55; }

    .rate-cell { display: flex; align-items: center; gap: 10px; }
    .rate-bar  { flex: 1; height: 6px; background: #2d3748; border-radius: 3px; min-width: 70px; }
    .rate-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    .rate-text { font-size: 0.82rem; font-weight: 600; width: 46px; text-align: right; }
    .r-high { background: #48bb78; } .c-high { color: #68d391; }
    .r-mid  { background: #ed8936; } .c-mid  { color: #f6ad55; }
    .r-low  { background: #fc8181; } .c-low  { color: #fc8181; }
    .r-na   { background: #4a5568; } .c-na   { color: #4a5568; }

    .cls-tag {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 0.75rem; background: #1e2a3a;
      color: #63b3ed; border: 1px solid #2c4a6e;
    }

    #tbl-loading, #tbl-error {
      text-align: center; padding: 60px 0; font-size: 0.95rem;
    }
    #tbl-loading { color: #718096; }
    #tbl-error   { color: #fc8181; }
    .spinner {
      display: inline-block; width: 26px; height: 26px;
      border: 3px solid #2d3748; border-top-color: #e2b96f;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ── 설정 오버레이 ── -->
<div id="setup-overlay">
  <div id="setup-box">
    <h2>⚔ 결사 멤버 현황</h2>
    <p>스프레드시트 URL을 붙여넣으세요.<br>
       시트가 <strong>링크가 있는 사람 누구나 보기</strong> 권한이어야 합니다.</p>

    <div id="setup-error"></div>

    <div class="form-group">
      <label>스프레드시트 URL</label>
      <input id="inp-url" type="text"
        placeholder="https://docs.google.com/spreadsheets/d/.../edit?gid=..." />
      <div class="form-hint">어떤 탭이든 주소창 URL을 그대로 복사하세요</div>
    </div>

    <div style="display:flex; gap:12px;">
      <div class="form-group" style="flex:1">
        <label>스펙표 GID</label>
        <input id="inp-spec-gid" type="text" placeholder="예: 8154540" />
        <div class="form-hint">스펙표 탭 URL의 gid= 숫자</div>
      </div>
      <div class="form-group" style="flex:1">
        <label>대시보드 GID</label>
        <input id="inp-dash-gid" type="text" placeholder="예: 1988878229" />
        <div class="form-hint">대시보드 탭 URL의 gid= 숫자</div>
      </div>
    </div>

    <button id="btn-load">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5"
           viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      데이터 불러오기
    </button>
  </div>
</div>

<!-- ── 메인 화면 ── -->
<div id="main">
  <header>
    <h1>⚔ 결사 멤버 현황</h1>
    <span id="header-url"></span>
    <button id="btn-change">시트 변경</button>
  </header>

  <div class="stats">
    <div class="card">
      <div class="label">전체 인원</div>
      <div class="value" id="s-total">—</div>
      <div class="sub">명</div>
    </div>
    <div class="card">
      <div class="label">평균 참여율</div>
      <div class="value" id="s-avg-rate">—</div>
      <div class="sub">%</div>
    </div>
    <div class="card">
      <div class="label">평균 투력</div>
      <div class="value" id="s-avg-power">—</div>
      <div class="sub">전투력</div>
    </div>
    <div class="card">
      <div class="label">총합 합계</div>
      <div class="value" id="s-total-sum">—</div>
      <div class="sub">포인트</div>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"
           viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/>
        <path d="M21 21l-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="아이디 검색…" />
    </div>
    <select id="filter-class"><option value="">전체 클래스</option></select>
    <select id="filter-rate">
      <option value="">전체 참여율</option>
      <option value="high">80% 이상</option>
      <option value="mid">50 ~ 80%</option>
      <option value="low">50% 미만</option>
    </select>
    <span id="count"></span>
    <button id="btn-refresh">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5"
           viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      새로고침
    </button>
  </div>

  <div class="table-wrap">
    <div id="tbl-loading" style="display:none">
      <div class="spinner"></div><br>시트 데이터 불러오는 중…
    </div>
    <div id="tbl-error" style="display:none"></div>
    <table id="tbl" style="display:none">
      <thead>
        <tr>
          <th data-col="rank" class="sorted-asc">#</th>
          <th data-col="아이디">아이디</th>
          <th data-col="클래스">클래스</th>
          <th data-col="등급">등급</th>
          <th data-col="투력">투력</th>
          <th data-col="총합">총합</th>
          <th data-col="총 참여율">총 참여율</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
  const LS_URL      = 'sheet_url';
  const LS_SPEC_GID = 'spec_gid';
  const LS_DASH_GID = 'dash_gid';

  let allData = [];
  let sortCol = 'rank';
  let sortDir = 1;

  /* ── 초기화: localStorage 에 저장된 값 복원 ── */
  window.addEventListener('DOMContentLoaded', () => {
    const savedUrl      = localStorage.getItem(LS_URL)      || '';
    const savedSpecGid  = localStorage.getItem(LS_SPEC_GID) || '';
    const savedDashGid  = localStorage.getItem(LS_DASH_GID) || '';
    if (savedUrl) document.getElementById('inp-url').value          = savedUrl;
    if (savedSpecGid) document.getElementById('inp-spec-gid').value = savedSpecGid;
    if (savedDashGid) document.getElementById('inp-dash-gid').value = savedDashGid;
    if (savedUrl && savedSpecGid && savedDashGid) {
      startLoad(savedUrl, savedSpecGid, savedDashGid);
    }
  });

  /* ── 설정 오버레이 ── */
  document.getElementById('btn-load').addEventListener('click', () => {
    const url     = document.getElementById('inp-url').value.trim();
    const specGid = document.getElementById('inp-spec-gid').value.trim();
    const dashGid = document.getElementById('inp-dash-gid').value.trim();
    const errEl   = document.getElementById('setup-error');
    errEl.style.display = 'none';

    if (!url || !specGid || !dashGid) {
      errEl.textContent = 'URL과 두 GID를 모두 입력해주세요.';
      errEl.style.display = '';
      return;
    }
    localStorage.setItem(LS_URL,      url);
    localStorage.setItem(LS_SPEC_GID, specGid);
    localStorage.setItem(LS_DASH_GID, dashGid);
    startLoad(url, specGid, dashGid);
  });

  document.getElementById('btn-change').addEventListener('click', () => {
    document.getElementById('main').style.display = 'none';
    document.getElementById('setup-overlay').style.display = 'flex';
  });

  /* ── 데이터 로드 ── */
  async function startLoad(url, specGid, dashGid) {
    document.getElementById('setup-overlay').style.display = 'none';
    document.getElementById('main').style.display = '';
    document.getElementById('tbl-loading').style.display = '';
    document.getElementById('tbl-error').style.display   = 'none';
    document.getElementById('tbl').style.display         = 'none';
    document.getElementById('btn-refresh').disabled      = true;

    const shortId = url.match(/\/d\/([^/]+)/)?.[1]?.slice(0, 24) + '…';
    document.getElementById('header-url').textContent = shortId || '';

    try {
      const params = new URLSearchParams({ url, spec_gid: specGid, dash_gid: dashGid });
      const res  = await fetch('/api/data?' + params);
      const json = await res.json();

      if (!res.ok) throw new Error(json.error || '알 수 없는 오류');

      allData = json.map((m, i) => ({ ...m, rank: i + 1 }));
      buildClassFilter();
      updateStats();
      render();
      document.getElementById('tbl').style.display = '';
    } catch (e) {
      document.getElementById('tbl-error').textContent = '⚠ ' + e.message;
      document.getElementById('tbl-error').style.display = '';
    } finally {
      document.getElementById('tbl-loading').style.display = 'none';
      document.getElementById('btn-refresh').disabled = false;
    }
  }

  document.getElementById('btn-refresh').addEventListener('click', () => {
    const url     = localStorage.getItem(LS_URL)      || '';
    const specGid = localStorage.getItem(LS_SPEC_GID) || '';
    const dashGid = localStorage.getItem(LS_DASH_GID) || '';
    if (url && specGid && dashGid) startLoad(url, specGid, dashGid);
  });

  /* ── 클래스 필터 ── */
  function buildClassFilter() {
    const sel = document.getElementById('filter-class');
    const classes = [...new Set(allData.map(m => m['클래스']))].sort();
    sel.innerHTML = '<option value="">전체 클래스</option>';
    classes.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      sel.appendChild(o);
    });
  }

  /* ── 요약 카드 ── */
  function updateStats() {
    const n = allData.length;
    const rates = allData.map(m => parseFloat(m['총 참여율'])).filter(v => !isNaN(v));
    const avgRate = rates.length ? (rates.reduce((a, b) => a + b, 0) / rates.length).toFixed(1) : '—';
    const avgPower = Math.round(allData.reduce((a, m) => a + m['투력'], 0) / n).toLocaleString();
    const totalSum = allData.reduce((a, m) => a + m['총합'], 0).toLocaleString();

    document.getElementById('s-total').textContent     = n;
    document.getElementById('s-avg-rate').textContent  = avgRate;
    document.getElementById('s-avg-power').textContent = avgPower;
    document.getElementById('s-total-sum').textContent = totalSum;
  }

  /* ── 필터 ── */
  function filtered() {
    const q    = document.getElementById('search').value.trim().toLowerCase();
    const cls  = document.getElementById('filter-class').value;
    const rate = document.getElementById('filter-rate').value;

    return allData.filter(m => {
      if (q && !m['아이디'].toLowerCase().includes(q)) return false;
      if (cls && m['클래스'] !== cls) return false;
      if (rate) {
        const v = parseFloat(m['총 참여율']);
        if (rate === 'high' && !(v >= 80))            return false;
        if (rate === 'mid'  && !(v >= 50 && v < 80))  return false;
        if (rate === 'low'  && !(isNaN(v) || v < 50)) return false;
      }
      return true;
    });
  }

  /* ── 정렬 ── */
  function sorted(data) {
    return [...data].sort((a, b) => {
      let av = a[sortCol], bv = b[sortCol];
      if (sortCol === '총 참여율') { av = parseFloat(av) || -1; bv = parseFloat(bv) || -1; }
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });
  }

  function rateStyle(v) {
    if (isNaN(v)) return ['r-na', 'c-na'];
    if (v >= 80)  return ['r-high', 'c-high'];
    if (v >= 50)  return ['r-mid',  'c-mid'];
    return ['r-low', 'c-low'];
  }

  function gradeClass(g) {
    return g >= 24 ? 'g-high' : g >= 22 ? 'g-mid' : 'g-low';
  }

  /* ── 렌더 ── */
  function render() {
    const rows = sorted(filtered());
    document.getElementById('count').textContent = `${rows.length}명 표시 중`;

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    rows.forEach(m => {
      const rv = parseFloat(m['총 참여율']);
      const [barCls, txtCls] = rateStyle(rv);
      const pct = isNaN(rv) ? 0 : rv;
      const rateText = isNaN(rv) ? 'N/A' : rv.toFixed(1) + '%';

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="rank">${m.rank}</td>
        <td class="id">${m['아이디']}</td>
        <td><span class="cls-tag">${m['클래스']}</span></td>
        <td><span class="grade ${gradeClass(m['등급'])}">${m['등급']}</span></td>
        <td class="num">${m['투력'].toLocaleString()}</td>
        <td class="num">${m['총합'].toLocaleString()}</td>
        <td>
          <div class="rate-cell">
            <div class="rate-bar">
              <div class="rate-fill ${barCls}" style="width:${pct}%"></div>
            </div>
            <span class="rate-text ${txtCls}">${rateText}</span>
          </div>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  /* ── 헤더 정렬 클릭 ── */
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) sortDir *= -1;
      else { sortCol = col; sortDir = 1; }
      document.querySelectorAll('thead th').forEach(t =>
        t.classList.remove('sorted-asc', 'sorted-desc'));
      th.classList.add(sortDir === 1 ? 'sorted-asc' : 'sorted-desc');
      render();
    });
  });

  document.getElementById('search').addEventListener('input', render);
  document.getElementById('filter-class').addEventListener('change', render);
  document.getElementById('filter-rate').addEventListener('change', render);
</script>
</body>
</html>
