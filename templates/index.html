<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결사 멤버 현황</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #e2e8f0; font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; min-height: 100vh; }

    .page { display: none; }
    .page.active { display: block; }
    #page-setup { min-height: 100vh; display: none; align-items: center; justify-content: center; }
    #page-setup.active { display: flex; }

    .setup-box {
      background: #1a1f2e; border: 1px solid #2d3748; border-radius: 14px;
      padding: 36px 40px; width: 100%; max-width: 520px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5); margin: 40px 16px;
    }
    .setup-box h2 { font-size: 1.2rem; font-weight: 700; color: #e2b96f; margin-bottom: 6px; }
    .setup-box p  { font-size: 0.82rem; color: #718096; margin-bottom: 24px; line-height: 1.6; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.75rem; font-weight: 600; color: #a0aec0; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-group input, .form-group select {
      width: 100%; background: #0f1117; border: 1px solid #2d3748; border-radius: 8px;
      color: #e2e8f0; font-size: 0.85rem; padding: 10px 14px; outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus { border-color: #e2b96f; }
    .form-group input::placeholder { color: #4a5568; font-size: 0.8rem; }
    .form-group select option { background: #1a1f2e; }
    .form-hint { font-size: 0.72rem; color: #4a5568; margin-top: 4px; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }

    #setup-error { background: #2d1515; border: 1px solid #822; border-radius: 6px; color: #fc8181; font-size: 0.82rem; padding: 10px 14px; margin-bottom: 14px; display: none; }

    /* URL 입력 + 버튼 한 줄 */
    .url-row { display: flex; gap: 8px; margin-bottom: 4px; }
    .url-row input { flex: 1; background: #0f1117; border: 1px solid #2d3748; border-radius: 8px; color: #e2e8f0; font-size: 0.85rem; padding: 10px 14px; outline: none; transition: border-color 0.2s; }
    .url-row input:focus { border-color: #e2b96f; }
    .url-row input::placeholder { color: #4a5568; font-size: 0.8rem; }
    .btn-search { background: #2d3748; border: none; border-radius: 8px; color: #a0aec0; font-size: 0.82rem; padding: 10px 14px; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
    .btn-search:hover { background: #3d4a5c; color: #e2e8f0; }
    .btn-search:disabled { opacity: 0.5; cursor: not-allowed; }

    /* 시트 선택 영역 */
    #sheet-select-area { display: none; margin-top: 8px; }

    .btn-primary { width: 100%; background: #e2b96f; border: none; border-radius: 8px; color: #0f1117; font-size: 0.9rem; font-weight: 700; padding: 12px; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; }
    .btn-primary:hover { background: #f0c97a; }
    .btn-primary:disabled { background: #4a5568; color: #718096; cursor: not-allowed; }

    /* 메인 */
    header { background: linear-gradient(135deg, #1a1f2e, #16213e); border-bottom: 1px solid #2d3748; padding: 16px 32px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    header h1 { font-size: 1.25rem; font-weight: 700; color: #e2b96f; }
    #header-url { font-size: 0.7rem; color: #4a5568; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-sm { background: transparent; border: 1px solid #2d3748; border-radius: 6px; color: #718096; font-size: 0.78rem; padding: 5px 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn-sm:hover { border-color: #e2b96f; color: #e2b96f; }

    .stats { display: flex; gap: 14px; padding: 20px 32px 0; flex-wrap: wrap; }
    .card { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 10px; padding: 14px 20px; min-width: 130px; flex: 1; }
    .card .label { font-size: 0.68rem; color: #718096; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .card .value { font-size: 1.4rem; font-weight: 700; color: #e2b96f; }
    .card .sub   { font-size: 0.7rem; color: #4a5568; }

    .toolbar { display: flex; gap: 10px; padding: 16px 32px; align-items: center; flex-wrap: wrap; }
    .search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 300px; }
    .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #4a5568; pointer-events: none; }
    .search-wrap input { width: 100%; background: #1a1f2e; border: 1px solid #2d3748; border-radius: 8px; color: #e2e8f0; font-size: 0.88rem; padding: 8px 12px 8px 34px; outline: none; transition: border-color 0.2s; }
    .search-wrap input:focus { border-color: #e2b96f; }
    .search-wrap input::placeholder { color: #4a5568; }
    .toolbar select { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 8px; color: #e2e8f0; font-size: 0.88rem; padding: 8px 12px; outline: none; cursor: pointer; }
    #count { font-size: 0.78rem; color: #4a5568; white-space: nowrap; }
    #btn-refresh { background: #e2b96f; border: none; border-radius: 8px; color: #0f1117; font-size: 0.82rem; font-weight: 700; padding: 8px 16px; cursor: pointer; margin-left: auto; display: flex; align-items: center; gap: 6px; transition: background 0.2s; }
    #btn-refresh:hover { background: #f0c97a; }
    #btn-refresh:disabled { background: #4a5568; color: #718096; cursor: not-allowed; }

    .table-wrap { padding: 0 32px 40px; overflow-x: auto; }
    #status-msg { text-align: center; padding: 50px; font-size: 0.9rem; color: #718096; }
    #status-msg.error { color: #fc8181; }
    .spinner { display: inline-block; width: 22px; height: 22px; border: 3px solid #2d3748; border-top-color: #e2b96f; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    table { width: 100%; border-collapse: collapse; font-size: 0.87rem; }
    thead th { background: #1a1f2e; color: #718096; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 11px 14px; text-align: left; border-bottom: 1px solid #2d3748; white-space: nowrap; cursor: pointer; user-select: none; }
    thead th:hover { color: #e2b96f; }
    thead th.asc::after  { content: ' ▲'; color: #e2b96f; }
    thead th.desc::after { content: ' ▼'; color: #e2b96f; }
    tbody tr { border-bottom: 1px solid #1e2435; transition: background 0.12s; }
    tbody tr:hover { background: #1a1f2e; }
    td { padding: 10px 14px; white-space: nowrap; }
    td.num  { text-align: right; color: #a0aec0; font-variant-numeric: tabular-nums; }
    td.rank { text-align: center; color: #4a5568; font-size: 0.78rem; }
    td.id   { font-weight: 600; }
    .grade { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; min-width: 28px; text-align: center; }
    .g-high { background: #2d4a22; color: #68d391; }
    .g-mid  { background: #2a3a1a; color: #9ae66e; }
    .g-low  { background: #3a2a1a; color: #f6ad55; }
    .cls-tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 0.73rem; background: #1e2a3a; color: #63b3ed; border: 1px solid #2c4a6e; }
    .rate-cell { display: flex; align-items: center; gap: 8px; }
    .rate-bar  { flex: 1; height: 5px; background: #2d3748; border-radius: 3px; min-width: 60px; }
    .rate-fill { height: 100%; border-radius: 3px; }
    .rate-text { font-size: 0.8rem; font-weight: 600; width: 44px; text-align: right; }
    .rh { background: #48bb78; } .ch { color: #68d391; }
    .rm { background: #ed8936; } .cm { color: #f6ad55; }
    .rl { background: #fc8181; } .cl { color: #fc8181; }
    .rn { background: #4a5568; } .cn { color: #4a5568; }
  </style>
</head>
<body>

<!-- ── 설정 화면 ── -->
<div id="page-setup" class="active">
  <div class="setup-box">
    <h2>⚔ 결사 멤버 현황</h2>
    <p>스프레드시트 URL을 입력하고 <strong>시트 검색</strong>을 누르세요.<br>
       시트가 <strong>링크 공유(보기)</strong> 상태여야 합니다.</p>

    <div id="setup-error"></div>

    <div class="form-group">
      <label>스프레드시트 URL</label>
      <div class="url-row">
        <input id="inp-url" type="text" placeholder="https://docs.google.com/spreadsheets/d/.../edit" />
        <button class="btn-search" id="btn-search">시트 검색</button>
      </div>
      <div class="form-hint">아무 탭에서나 주소창 URL을 복사하면 됩니다</div>
    </div>

    <div id="sheet-select-area">
      <div class="form-row">
        <div class="form-group">
          <label>스펙표 시트</label>
          <select id="sel-spec"></select>
        </div>
        <div class="form-group">
          <label>대시보드 시트</label>
          <select id="sel-dash"></select>
        </div>
      </div>
      <button class="btn-primary" id="btn-load">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        데이터 불러오기
      </button>
    </div>
  </div>
</div>

<!-- ── 메인 화면 ── -->
<div id="page-main" class="page">
  <header>
    <h1>⚔ 결사 멤버 현황</h1>
    <span id="header-url"></span>
    <button class="btn-sm" id="btn-change">시트 변경</button>
  </header>

  <div class="stats">
    <div class="card"><div class="label">전체 인원</div><div class="value" id="s-total">—</div><div class="sub">명</div></div>
    <div class="card"><div class="label">평균 참여율</div><div class="value" id="s-avg-rate">—</div><div class="sub">%</div></div>
    <div class="card"><div class="label">평균 투력</div><div class="value" id="s-avg-power">—</div><div class="sub">전투력</div></div>
    <div class="card"><div class="label">총합 합계</div><div class="value" id="s-total-sum">—</div><div class="sub">포인트</div></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input id="search" type="text" placeholder="아이디 검색…" />
    </div>
    <select id="filter-class"><option value="">전체 클래스</option></select>
    <select id="filter-rate">
      <option value="">전체 참여율</option>
      <option value="high">80% 이상</option>
      <option value="mid">50 ~ 80%</option>
      <option value="low">50% 미만</option>
    </select>
    <span id="count"></span>
    <button id="btn-refresh">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      새로고침
    </button>
  </div>

  <div class="table-wrap">
    <div id="status-msg"></div>
    <table id="tbl" style="display:none">
      <thead>
        <tr>
          <th data-col="rank" class="asc">#</th>
          <th data-col="아이디">아이디</th>
          <th data-col="클래스">클래스</th>
          <th data-col="등급">등급</th>
          <th data-col="투력">투력</th>
          <th data-col="총합">총합</th>
          <th data-col="총 참여율">총 참여율</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
  const LS_URL      = 'ap_url';
  const LS_SPEC_GID = 'ap_spec_gid';
  const LS_DASH_GID = 'ap_dash_gid';

  let allData = [], sortCol = 'rank', sortDir = 1;
  let cachedUrl = '';

  function showPage(id) {
    document.querySelectorAll('.page, #page-setup').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showError(msg) {
    const el = document.getElementById('setup-error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  /* ── 초기화: 저장된 설정 있으면 자동 로드 ── */
  window.addEventListener('DOMContentLoaded', () => {
    const u = localStorage.getItem(LS_URL)      || '';
    const s = localStorage.getItem(LS_SPEC_GID) || '';
    const d = localStorage.getItem(LS_DASH_GID) || '';
    if (u) document.getElementById('inp-url').value = u;
    if (u && s && d) loadData(u, s, d);
  });

  /* ── 시트 검색 ── */
  document.getElementById('btn-search').addEventListener('click', async () => {
    const url = document.getElementById('inp-url').value.trim();
    const errEl = document.getElementById('setup-error');
    errEl.style.display = 'none';

    if (!url) { showError('URL을 입력해주세요.'); return; }

    const btn = document.getElementById('btn-search');
    btn.disabled = true;
    btn.textContent = '검색 중…';

    try {
      const res  = await fetch('/api/sheets?' + new URLSearchParams({ url }));
      const json = await res.json();
      if (!res.ok) throw new Error(json.error);

      cachedUrl = url;
      populateSheetSelects(json.sheets);
      document.getElementById('sheet-select-area').style.display = 'block';
    } catch (e) {
      showError('시트 목록을 불러오지 못했습니다: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '시트 검색';
    }
  });

  function populateSheetSelects(sheets) {
    const specSel = document.getElementById('sel-spec');
    const dashSel = document.getElementById('sel-dash');
    specSel.innerHTML = '';
    dashSel.innerHTML = '';

    sheets.forEach(s => {
      const o1 = document.createElement('option');
      o1.value = s.gid; o1.textContent = s.title;
      const o2 = o1.cloneNode(true);
      specSel.appendChild(o1);
      dashSel.appendChild(o2);
    });

    // 이름으로 자동 선택
    const autoSelect = (sel, keywords) => {
      const opt = [...sel.options].find(o =>
        keywords.some(k => o.textContent.includes(k))
      );
      if (opt) sel.value = opt.value;
    };
    autoSelect(specSel, ['스펙표', '스펙', 'spec']);
    autoSelect(dashSel, ['대시보드', '참여율', 'dashboard']);
  }

  /* ── 데이터 불러오기 ── */
  document.getElementById('btn-load').addEventListener('click', () => {
    const url     = cachedUrl || document.getElementById('inp-url').value.trim();
    const specGid = document.getElementById('sel-spec').value;
    const dashGid = document.getElementById('sel-dash').value;

    if (!specGid || !dashGid) { showError('시트를 선택해주세요.'); return; }

    localStorage.setItem(LS_URL,      url);
    localStorage.setItem(LS_SPEC_GID, specGid);
    localStorage.setItem(LS_DASH_GID, dashGid);
    loadData(url, specGid, dashGid);
  });

  document.getElementById('btn-change').addEventListener('click', () => showPage('page-setup'));
  document.getElementById('btn-refresh').addEventListener('click', () => {
    const u = localStorage.getItem(LS_URL)      || '';
    const s = localStorage.getItem(LS_SPEC_GID) || '';
    const d = localStorage.getItem(LS_DASH_GID) || '';
    if (u && s && d) loadData(u, s, d);
  });

  /* ── 데이터 로드 ── */
  async function loadData(url, specGid, dashGid) {
    showPage('page-main');
    document.getElementById('status-msg').className = '';
    document.getElementById('status-msg').innerHTML = '<span class="spinner"></span> 데이터 불러오는 중…';
    document.getElementById('tbl').style.display = 'none';
    document.getElementById('btn-refresh').disabled = true;

    const shortId = (url.match(/\/d\/([^/?#]+)/)?.[1] || '').slice(0, 28);
    document.getElementById('header-url').textContent = shortId ? shortId + '…' : '';

    try {
      const res  = await fetch('/api/data?' + new URLSearchParams({ url, spec_gid: specGid, dash_gid: dashGid }));
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || '서버 오류');

      allData = json.map((m, i) => ({ ...m, rank: i + 1 }));
      buildClassFilter();
      updateStats();
      render();
      document.getElementById('status-msg').textContent = '';
      document.getElementById('tbl').style.display = '';
    } catch (e) {
      document.getElementById('status-msg').className = 'error';
      document.getElementById('status-msg').textContent = '오류: ' + e.message;
    } finally {
      document.getElementById('btn-refresh').disabled = false;
    }
  }

  function buildClassFilter() {
    const sel = document.getElementById('filter-class');
    const classes = [...new Set(allData.map(m => m['클래스']))].sort();
    sel.innerHTML = '<option value="">전체 클래스</option>';
    classes.forEach(c => { const o = document.createElement('option'); o.value = o.textContent = c; sel.appendChild(o); });
  }

  function updateStats() {
    const n = allData.length;
    const rates = allData.map(m => parseFloat(m['총 참여율'])).filter(v => !isNaN(v));
    document.getElementById('s-total').textContent     = n;
    document.getElementById('s-avg-rate').textContent  = rates.length ? (rates.reduce((a, b) => a + b, 0) / rates.length).toFixed(1) : '—';
    document.getElementById('s-avg-power').textContent = n ? Math.round(allData.reduce((a, m) => a + m['투력'], 0) / n).toLocaleString() : '—';
    document.getElementById('s-total-sum').textContent = allData.reduce((a, m) => a + m['총합'], 0).toLocaleString();
  }

  function filtered() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    const cls = document.getElementById('filter-class').value;
    const rate = document.getElementById('filter-rate').value;
    return allData.filter(m => {
      if (q && !m['아이디'].toLowerCase().includes(q)) return false;
      if (cls && m['클래스'] !== cls) return false;
      if (rate) {
        const v = parseFloat(m['총 참여율']);
        if (rate === 'high' && !(v >= 80)) return false;
        if (rate === 'mid'  && !(v >= 50 && v < 80)) return false;
        if (rate === 'low'  && !(isNaN(v) || v < 50)) return false;
      }
      return true;
    });
  }

  function sorted(data) {
    return [...data].sort((a, b) => {
      let av = a[sortCol], bv = b[sortCol];
      if (sortCol === '총 참여율') { av = parseFloat(av) || -1; bv = parseFloat(bv) || -1; }
      return (av < bv ? -1 : av > bv ? 1 : 0) * sortDir;
    });
  }

  function render() {
    const rows = sorted(filtered());
    document.getElementById('count').textContent = rows.length + '명 표시 중';
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    rows.forEach(m => {
      const rv = parseFloat(m['총 참여율']);
      const [bc, tc] = rv >= 80 ? ['rh','ch'] : rv >= 50 ? ['rm','cm'] : isNaN(rv) ? ['rn','cn'] : ['rl','cl'];
      const pct  = isNaN(rv) ? 0 : rv;
      const rtxt = isNaN(rv) ? 'N/A' : rv.toFixed(1) + '%';
      const g = m['등급'] >= 24 ? 'g-high' : m['등급'] >= 22 ? 'g-mid' : 'g-low';
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="rank">${m.rank}</td>
        <td class="id">${m['아이디']}</td>
        <td><span class="cls-tag">${m['클래스']}</span></td>
        <td><span class="grade ${g}">${m['등급']}</span></td>
        <td class="num">${m['투력'].toLocaleString()}</td>
        <td class="num">${m['총합'].toLocaleString()}</td>
        <td><div class="rate-cell">
          <div class="rate-bar"><div class="rate-fill ${bc}" style="width:${pct}%"></div></div>
          <span class="rate-text ${tc}">${rtxt}</span>
        </div></td>`;
      tbody.appendChild(tr);
    });
  }

  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      sortDir = sortCol === th.dataset.col ? -sortDir : 1;
      sortCol = th.dataset.col;
      document.querySelectorAll('thead th').forEach(t => t.classList.remove('asc', 'desc'));
      th.classList.add(sortDir === 1 ? 'asc' : 'desc');
      render();
    });
  });

  document.getElementById('search').addEventListener('input', render);
  document.getElementById('filter-class').addEventListener('change', render);
  document.getElementById('filter-rate').addEventListener('change', render);
</script>
</body>
</html>
